repo_name: buddy-compiler/buddy-mlir
local_path: ../buddy-mlir

llvm:
  dep_type: submodule
  dep_path: llvm
  upstream_url: https://github.com/RuyiAI-Stack/llvm-project
  upstream_branch: riscv

build:
  dir: build
  clean:
    - rm -rf build
    - rm -rf llvm/build
  commands:
    - mkdir -p llvm/build
    - >-
      cmake -G Ninja -S llvm/llvm -B llvm/build
      -DLLVM_ENABLE_PROJECTS='mlir;clang'
      -DLLVM_TARGETS_TO_BUILD='host;RISCV'
      -DLLVM_ENABLE_RUNTIMES='openmp'
      -DLLVM_ENABLE_ASSERTIONS=ON
      -DOPENMP_ENABLE_LIBOMPTARGET=OFF
      -DCMAKE_BUILD_TYPE=RELEASE
      -DMLIR_ENABLE_BINDINGS_PYTHON=ON
      -DPython3_EXECUTABLE=$(which python3)
    - ninja -C llvm/build check-clang check-mlir
    - >-
      ninja -C llvm/build check-openmp
    - mkdir -p build
    - >-
      cmake -G Ninja -S . -B build
      -DMLIR_DIR=${repo_path}/llvm/build/lib/cmake/mlir
      -DLLVM_DIR=${repo_path}/llvm/build/lib/cmake/llvm
      -DLLVM_ENABLE_ASSERTIONS=ON
      -DCMAKE_BUILD_TYPE=RELEASE
      -DBUDDY_MLIR_ENABLE_PYTHON_PACKAGES=ON
      -DPython3_EXECUTABLE=$(which python3)
    - ninja -C build
  timeout: 3600

test:
  commands:
    - ninja -C build check-buddy
  timeout: 1800
